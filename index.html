<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bank Hapoalim Carpet — Interactive Explorer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --panel-width: 380px;
      --header-height: 56px;
      --accent: #8b6f4e;
      --bg: #f5f0eb;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --border: #d6cdc4;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a1a;
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── HEADER ─── */
    header {
      height: var(--header-height);
      background: #111;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
      border-bottom: 1px solid #333;
      z-index: 100;
    }

    .header-title {
      color: #fff;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 300;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .lang-btn {
      background: none;
      border: 1px solid #555;
      color: #aaa;
      font-size: 11px;
      padding: 4px 10px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
    }
    .lang-btn.active {
      border-color: #999;
      color: #fff;
    }
    .lang-btn:hover {
      border-color: #aaa;
      color: #fff;
    }

    .home-btn {
      background: none;
      border: 1px solid #555;
      color: #aaa;
      font-size: 18px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
    }
    .home-btn:hover {
      border-color: #aaa;
      color: #fff;
    }

    /* ─── MAIN LAYOUT ─── */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* ─── SVG VIEWPORT ─── */
    #svg-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #111;
      cursor: grab;
    }
    #svg-container.dragging {
      cursor: grabbing;
    }

    #svg-container svg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
    }

    /* Clickable regions — transparent by default */
    #svg-container svg g[data-id] {
      cursor: pointer;
    }
    #svg-container svg g[data-id] path,
    #svg-container svg g[data-id] polygon,
    #svg-container svg g[data-id] rect {
      fill: rgba(0,0,0,0);
      stroke: rgba(255,255,255,0);
      stroke-width: 8;
      transition: fill 0.15s, stroke 0.15s;
      vector-effect: non-scaling-stroke;
    }
    #svg-container svg g[data-id]:hover path,
    #svg-container svg g[data-id]:hover polygon,
    #svg-container svg g[data-id]:hover rect {
      fill: rgba(255, 220, 120, 0.18);
      stroke: rgba(255, 220, 120, 0.85);
    }
    #svg-container svg g[data-id].active path,
    #svg-container svg g[data-id].active polygon,
    #svg-container svg g[data-id].active rect {
      fill: rgba(255, 200, 80, 0.28);
      stroke: rgba(255, 200, 80, 1);
    }

    /* ─── HINT OVERLAY ─── */
    #hint {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 12px 24px;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      pointer-events: none;
      transition: opacity 0.6s;
      white-space: nowrap;
    }
    #hint.hidden { opacity: 0; }

    /* ─── SIDE PANEL ─── */
    #panel {
      width: var(--panel-width);
      background: var(--bg);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      flex-shrink: 0;
    }
    #panel.open { transform: translateX(0); }

    .panel-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: #fff;
      position: relative;
    }

    .panel-num {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .panel-title {
      font-size: 18px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.3;
      padding-right: 28px;
    }

    .panel-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 28px;
      height: 28px;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .panel-close:hover {
      background: #eee;
      color: var(--text);
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }

    .panel-body img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto 12px;
      background: #eee;
    }

    .panel-body p {
      font-size: 13px;
      color: #444;
      line-height: 1.7;
      margin-bottom: 8px;
    }

    .panel-body strong {
      font-weight: 600;
      color: var(--text);
    }

    /* AlsoSee */
    .also-see {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .also-see-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .also-see-links {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .also-see-link {
      background: none;
      border: 1px solid var(--border);
      color: var(--accent);
      font-size: 11px;
      padding: 5px 10px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .also-see-link:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* RTL */
    body.rtl { direction: rtl; }
    body.rtl #panel {
      border-left: none;
      border-right: 1px solid var(--border);
      transform: translateX(-100%);
      order: -1;
    }
    body.rtl #panel.open { transform: translateX(0); }
    body.rtl .panel-title { padding-right: 0; padding-left: 28px; }
    body.rtl .panel-close { right: auto; left: 16px; }

    /* ─── LOADING ─── */
    #loading {
      position: absolute;
      inset: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 200;
      transition: opacity 0.5s;
    }
    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #loading-msg {
      color: #555;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    #loading-detail {
      color: #444;
      font-size: 11px;
      max-width: 340px;
      text-align: center;
      line-height: 1.6;
      display: none;
    }
    #loading-retry {
      display: none;
      background: none;
      border: 1px solid #555;
      color: #aaa;
      font-size: 11px;
      padding: 6px 18px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    #loading-retry:hover {
      border-color: #aaa;
      color: #fff;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 700px) {
      :root { --panel-width: 100vw; }
      #panel {
        position: absolute;
        inset: 0;
        z-index: 50;
        transform: translateX(100%);
      }
      body.rtl #panel { transform: translateX(-100%); }
    }
  </style>
</head>
<body>

<header>
  <span class="header-title">Bank Hapoalim Carpet</span>
  <div class="header-controls">
    <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="btn-he" onclick="setLang('he')">עב</button>
    <button class="home-btn" title="Reset view" onclick="resetView()">⌂</button>
  </div>
</header>

<div class="main">
  <div id="svg-container">
    <div id="hint">Select a detail from the carpet</div>
    <div id="loading">
      <span id="loading-msg">Loading carpet…</span>
      <span id="loading-detail"></span>
      <button id="loading-retry" onclick="retryBoot()">נסה שוב / Retry</button>
    </div>
  </div>

  <div id="panel">
    <div class="panel-header">
      <div class="panel-num" id="panel-num"></div>
      <div class="panel-title" id="panel-title"></div>
      <button class="panel-close" onclick="closePanel()">×</button>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </div>
</div>

<script src="data.js"></script>
<script>
// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
let lang = 'en';
let svgEl = null;
let activeId = null;
let hintTimer = null;

// viewBox state
const VB = { x: 0, y: 0, w: 4500, h: 3661 };
const VB_HOME = { x: 0, y: 0, w: 4500, h: 3661 };
let animTarget = { ...VB };
let animFrame = null;

// Drag state
let isDragging = false;
let dragStart = null;
let vbAtDrag = null;
let dragMoved = false;

// Pinch-to-zoom state
let pinchDist0 = null;
let vbAtPinch = null;

// ─────────────────────────────────────────────
// Boot: fetch & inline SVG
// ─────────────────────────────────────────────
async function boot() {
  const msgEl    = document.getElementById('loading-msg');
  const detailEl = document.getElementById('loading-detail');
  const retryEl  = document.getElementById('loading-retry');

  // Reset to loading state (for retries)
  msgEl.textContent = 'Loading carpet…';
  detailEl.style.display = 'none';
  retryEl.style.display  = 'none';

  let res;
  try {
    res = await fetch('carpet.svg');
  } catch (e) {
    showError(
      'לא ניתן להתחבר / Cannot connect',
      'האפליקציה חייבת לרוץ דרך שרת HTTP.\nהרץ: python3 -m http.server 8080\nThe app must be served over HTTP, not file://',
      true
    );
    console.error(e);
    return;
  }

  if (!res.ok) {
    showError(
      `שגיאת טעינה / Load error ${res.status}`,
      `carpet.svg לא נמצא (${res.status} ${res.statusText}).\nוודא שכל הקבצים באותה תיקייה.`,
      true
    );
    return;
  }

  const text = await res.text();
  const container = document.getElementById('svg-container');

  const parser = new DOMParser();
  const doc = parser.parseFromString(text, 'image/svg+xml');

  // Check for SVG parse error
  if (doc.querySelector('parsererror')) {
    showError('קובץ SVG פגום / Corrupt SVG', 'carpet.svg לא תקין — נסה להוריד מחדש.', false);
    return;
  }

  svgEl = doc.documentElement;
  svgEl.removeAttribute('width');
  svgEl.removeAttribute('height');
  svgEl.setAttribute('viewBox', '0 0 4500 3661');
  svgEl.setAttribute('preserveAspectRatio', 'xMidYMid meet');

  container.insertBefore(svgEl, document.getElementById('hint'));
  attachHandlers();

  document.getElementById('loading').classList.add('hidden');
  showHint();
}

function showError(title, detail, canRetry) {
  const msgEl    = document.getElementById('loading-msg');
  const detailEl = document.getElementById('loading-detail');
  const retryEl  = document.getElementById('loading-retry');
  msgEl.textContent       = title;
  detailEl.textContent    = detail;
  detailEl.style.display  = 'block';
  retryEl.style.display   = canRetry ? 'block' : 'none';
}

function retryBoot() {
  boot().catch(err => {
    showError('שגיאה בלתי צפויה / Unexpected error', err.message || String(err), true);
    console.error(err);
  });
}

// ─────────────────────────────────────────────
// Attach click/drag handlers
// ─────────────────────────────────────────────
function attachHandlers() {
  const groups = svgEl.querySelectorAll('g[data-id]');
  groups.forEach(g => {
    g.addEventListener('click', onRegionClick);
  });

  svgEl.addEventListener('mousedown', onDragStart);
  window.addEventListener('mousemove', onDragMove);
  window.addEventListener('mouseup', onDragEnd);

  svgEl.addEventListener('touchstart', onTouchStart, { passive: false });
  window.addEventListener('touchmove', onTouchMove, { passive: false });
  window.addEventListener('touchend', onDragEnd);

  document.getElementById('svg-container').addEventListener('wheel', onWheel, { passive: false });
}

// ─────────────────────────────────────────────
// Hint
// ─────────────────────────────────────────────
function showHint() {
  const el = document.getElementById('hint');
  el.classList.remove('hidden');
  clearTimeout(hintTimer);
  hintTimer = setTimeout(() => el.classList.add('hidden'), 4000);
}

// ─────────────────────────────────────────────
// Region click → zoom + panel
// ─────────────────────────────────────────────
function onRegionClick(e) {
  if (dragMoved) return;
  const g = e.currentTarget;
  const id = parseInt(g.getAttribute('data-id'), 10);
  if (!id) return;

  setActive(id);
  zoomToRegion(g);
  showPanel(id);
  document.getElementById('hint').classList.add('hidden');
}

function setActive(id) {
  if (activeId) {
    const prev = svgEl.querySelector(`g[data-id="${activeId}"]`);
    if (prev) prev.classList.remove('active');
  }
  activeId = id;
  const g = svgEl.querySelector(`g[data-id="${id}"]`);
  if (g) g.classList.add('active');
}

// ─────────────────────────────────────────────
// Zoom to region via BBox + viewBox animation
// ─────────────────────────────────────────────
function zoomToRegion(g) {
  const shapes = g.querySelectorAll('path, polygon, rect');
  if (!shapes.length) return;

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  shapes.forEach(s => {
    try {
      const bb = s.getBBox();
      if (bb.width === 0 && bb.height === 0) return;
      minX = Math.min(minX, bb.x);
      minY = Math.min(minY, bb.y);
      maxX = Math.max(maxX, bb.x + bb.width);
      maxY = Math.max(maxY, bb.y + bb.height);
    } catch(err) {}
  });

  if (!isFinite(minX)) return;

  const PAD = 280;
  let rw = maxX - minX + PAD * 2;
  let rh = maxY - minY + PAD * 2;
  let rx = minX - PAD;
  let ry = minY - PAD;

  // Maintain container aspect ratio
  const cont = document.getElementById('svg-container');
  const ar = cont.clientWidth / cont.clientHeight;
  if (rw / rh < ar) rw = rh * ar;
  else rh = rw / ar;

  // Clamp
  rw = Math.min(rw, 4500);
  rh = Math.min(rh, 3661);
  rx = Math.max(0, Math.min(rx - (rw - (maxX - minX + PAD * 2)) / 2, 4500 - rw));
  ry = Math.max(0, Math.min(ry - (rh - (maxY - minY + PAD * 2)) / 2, 3661 - rh));

  animateTo(rx, ry, rw, rh);
}

// ─────────────────────────────────────────────
// viewBox lerp animation
// ─────────────────────────────────────────────
function animateTo(tx, ty, tw, th) {
  animTarget = { x: tx, y: ty, w: tw, h: th };
  if (animFrame) return;
  tick();
}

function tick() {
  const EASE = 0.1;
  const dx = animTarget.x - VB.x;
  const dy = animTarget.y - VB.y;
  const dw = animTarget.w - VB.w;
  const dh = animTarget.h - VB.h;

  if (Math.abs(dx) < 0.3 && Math.abs(dy) < 0.3 && Math.abs(dw) < 0.3 && Math.abs(dh) < 0.3) {
    Object.assign(VB, animTarget);
    applyVB();
    animFrame = null;
    return;
  }

  VB.x += dx * EASE;
  VB.y += dy * EASE;
  VB.w += dw * EASE;
  VB.h += dh * EASE;
  applyVB();
  animFrame = requestAnimationFrame(tick);
}

function applyVB() {
  if (svgEl) svgEl.setAttribute('viewBox', `${VB.x} ${VB.y} ${VB.w} ${VB.h}`);
}

function resetView() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  animateTo(VB_HOME.x, VB_HOME.y, VB_HOME.w, VB_HOME.h);
  closePanel();
}

// ─────────────────────────────────────────────
// Drag to pan
// ─────────────────────────────────────────────
function clientToSVG(cx, cy) {
  const cont = document.getElementById('svg-container');
  const r = cont.getBoundingClientRect();
  return {
    x: (cx - r.left) / r.width * VB.w + VB.x,
    y: (cy - r.top) / r.height * VB.h + VB.y
  };
}

function onDragStart(e) {
  if (e.button && e.button !== 0) return;
  isDragging = true;
  dragMoved = false;
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  dragStart = clientToSVG(cx, cy);
  vbAtDrag = { ...VB };
  document.getElementById('svg-container').classList.add('dragging');
}

function onDragMove(e) {
  if (!isDragging || !dragStart) return;
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;

  // Recompute based on original drag start to avoid drift
  const cont = document.getElementById('svg-container');
  const r = cont.getBoundingClientRect();
  const curX = (cx - r.left) / r.width * VB.w + VB.x;
  const curY = (cy - r.top) / r.height * VB.h + VB.y;
  const dx = dragStart.x - curX;
  const dy = dragStart.y - curY;

  if (Math.abs(dx) > 1 || Math.abs(dy) > 1) dragMoved = true;
  if (!dragMoved) return;

  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }

  VB.x = Math.max(0, Math.min(vbAtDrag.x + dx, 4500 - VB.w));
  VB.y = Math.max(0, Math.min(vbAtDrag.y + dy, 3661 - VB.h));
  Object.assign(animTarget, VB);
  applyVB();
}

function onDragEnd() {
  isDragging = false;
  dragStart = null;
  document.getElementById('svg-container').classList.remove('dragging');
}

function pinchDist(e) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

function pinchMid(e) {
  return {
    x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
    y: (e.touches[0].clientY + e.touches[1].clientY) / 2
  };
}

function onTouchStart(e) {
  e.preventDefault();
  if (e.touches.length === 1) {
    pinchDist0 = null;
    vbAtPinch = null;
    onDragStart(e);
  } else if (e.touches.length === 2) {
    isDragging = false;
    dragStart = null;
    pinchDist0 = pinchDist(e);
    vbAtPinch = { ...VB };
  }
}

function onTouchMove(e) {
  e.preventDefault();
  if (e.touches.length === 1 && !pinchDist0) {
    onDragMove(e);
  } else if (e.touches.length === 2 && pinchDist0 !== null) {
    if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }

    const dist = pinchDist(e);
    const scale = pinchDist0 / dist;
    const mid = pinchMid(e);

    const cont = document.getElementById('svg-container');
    const r = cont.getBoundingClientRect();
    const mx = (mid.x - r.left) / r.width;
    const my = (mid.y - r.top) / r.height;

    const newW = Math.max(400, Math.min(4500, vbAtPinch.w * scale));
    const newH = Math.max(325, Math.min(3661, vbAtPinch.h * scale));

    VB.x = Math.max(0, Math.min(vbAtPinch.x + (vbAtPinch.w - newW) * mx, 4500 - newW));
    VB.y = Math.max(0, Math.min(vbAtPinch.y + (vbAtPinch.h - newH) * my, 3661 - newH));
    VB.w = newW;
    VB.h = newH;
    Object.assign(animTarget, VB);
    applyVB();
    dragMoved = true;
  }
}

// ─────────────────────────────────────────────
// Scroll wheel zoom
// ─────────────────────────────────────────────
function onWheel(e) {
  e.preventDefault();
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }

  const factor = e.deltaY > 0 ? 1.1 : 0.9;
  const cont = document.getElementById('svg-container');
  const r = cont.getBoundingClientRect();
  const mx = (e.clientX - r.left) / r.width;
  const my = (e.clientY - r.top) / r.height;

  const newW = Math.max(400, Math.min(4500, VB.w * factor));
  const newH = Math.max(325, Math.min(3661, VB.h * factor));
  VB.x = Math.max(0, Math.min(VB.x + (VB.w - newW) * mx, 4500 - newW));
  VB.y = Math.max(0, Math.min(VB.y + (VB.h - newH) * my, 3661 - newH));
  VB.w = newW;
  VB.h = newH;
  Object.assign(animTarget, VB);
  applyVB();
}

// ─────────────────────────────────────────────
// Panel
// ─────────────────────────────────────────────
function showPanel(id) {
  const data = CARPET_DATA[lang][id];
  if (!data) {
    document.getElementById('panel-num').textContent = lang === 'he' ? `פרט ${id}` : `Detail ${id}`;
    document.getElementById('panel-title').textContent = lang === 'he' ? 'אין מידע זמין' : 'No information available';
    document.getElementById('panel-body').innerHTML =
      `<p style="color:#888;font-size:13px;margin-top:8px">${lang === 'he' ? 'פרט זה אינו מתועד עדיין.' : 'This detail has not been documented yet.'}</p>`;
    document.getElementById('panel').classList.add('open');
    return;
  }

  document.getElementById('panel-num').textContent =
    lang === 'he' ? `פרט ${id} מתוך 84` : `Detail ${id} of 84`;
  document.getElementById('panel-title').textContent = data.title || '';

  let html = data.text || '';

  const alsoIds = CARPET_DATA.alsoSee[String(id)];
  if (alsoIds && alsoIds.length) {
    const label = lang === 'he' ? 'ראה גם' : 'Also see';
    html += `<div class="also-see"><div class="also-see-label">${label}</div><div class="also-see-links">`;
    alsoIds.forEach(refId => {
      const ref = CARPET_DATA[lang][refId];
      if (ref) html += `<button class="also-see-link" onclick="navigateTo(${refId})">${ref.title || refId}</button>`;
    });
    html += `</div></div>`;
  }

  document.getElementById('panel-body').innerHTML = html;

  // Convert legacy #NNN anchor links to navigateTo() calls
  document.getElementById('panel-body').querySelectorAll('a[href^="#"]').forEach(a => {
    const id = parseInt(a.getAttribute('href').slice(1), 10);
    if (!isNaN(id)) {
      a.href = 'javascript:void(0)';
      a.onclick = (ev) => { ev.preventDefault(); navigateTo(id); };
    }
  });

  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  if (activeId && svgEl) {
    const g = svgEl.querySelector(`g[data-id="${activeId}"]`);
    if (g) g.classList.remove('active');
  }
  activeId = null;
}

function navigateTo(id) {
  setActive(id);
  if (svgEl) {
    const g = svgEl.querySelector(`g[data-id="${id}"]`);
    if (g) zoomToRegion(g);
  }
  showPanel(id);
}

// ─────────────────────────────────────────────
// Language
// ─────────────────────────────────────────────
function setLang(l) {
  lang = l;
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.getElementById('btn-he').classList.toggle('active', l === 'he');

  const isHe = l === 'he';
  document.body.classList.toggle('rtl', isHe);
  document.documentElement.lang = l;
  document.documentElement.dir = isHe ? 'rtl' : 'ltr';
  document.getElementById('hint').textContent = isHe
    ? 'בחר פרט מהשטיח'
    : 'Select a detail from the carpet';

  if (activeId) showPanel(activeId);
}

// ─────────────────────────────────────────────
// Start
// ─────────────────────────────────────────────
boot().catch(err => {
  showError('שגיאה בלתי צפויה / Unexpected error', err.message || String(err), true);
  console.error(err);
});
</script>
</body>
</html>
